name: Atualizar dados ECODATA

on:
  # Permite rodar manualmente pelo botão "Run workflow"
  workflow_dispatch:

  # Atualização automática diária
  # Horário em UTC. 10:00 UTC = aproximadamente 07:00 no Brasil, dependendo do fuso.
  schedule:
    - cron: "0 10 * * *"

permissions:
  contents: write

jobs:
  atualizar-dados:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Rodar pipeline de atualização
        run: |
          python src/atualizar_base.py

      - name: Verificar arquivos gerados
        run: |
          echo "Arquivos em data/final:"
          find data/final -type f || true
          echo "Arquivos em logs:"
          find logs -type f || true

      - name: Commitar arquivos atualizados
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/ logs/

          git commit -m "Atualização automática das bases ECODATA" || echo "Sem alterações para commit"

          git push
